<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aerolab · Engage — Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; background: #2A2823; color: #FCFCFC; font-family: 'Plus Jakarta Sans', sans-serif; }

    /* LOGIN */
    .login-wrap { max-width: 400px; margin: 0 auto; padding: 80px 28px; text-align: center; }
    .login-logo { display: flex; justify-content: center; margin-bottom: 24px; }
    .login-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .login-sub { font-size: 13px; color: #93928F; margin-bottom: 32px; }
    .login-input { width: 100%; background: rgba(252,252,252,0.06); border: 1px solid rgba(252,252,252,0.12); border-radius: 8px; padding: 14px 16px; color: #FCFCFC; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; margin-bottom: 12px; letter-spacing: 0.06em; transition: border 0.18s; }
    .login-input:focus { outline: none; border-color: rgba(255,80,5,0.5); }
    .login-input::placeholder { color: #54524E; letter-spacing: 0; }
    .btn-login { width: 100%; background: #FF5005; border: none; color: #FCFCFC; padding: 14px; border-radius: 8px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.18s; }
    .btn-login:hover { background: #E0440A; }
    .login-error { font-size: 12px; color: #E2373C; margin-top: 8px; display: none; }

    /* DASHBOARD */
    .dash { max-width: 900px; margin: 0 auto; padding: 0 28px 80px; display: none; }
    .dash-nav { display: flex; align-items: center; justify-content: space-between; padding: 28px 0 0; margin-bottom: 32px; border-bottom: 1px solid rgba(252,252,252,0.06); padding-bottom: 20px; }
    .dash-logo { display: flex; align-items: center; gap: 9px; }
    .dash-logo span { font-weight: 800; font-size: 15px; }
    .admin-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; background: rgba(255,80,5,0.15); border: 1px solid rgba(255,80,5,0.3); color: #FF5005; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.06em; }
    .btn-logout { background: transparent; border: 1px solid rgba(252,252,252,0.12); color: #93928F; padding: 7px 14px; border-radius: 6px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.18s; }
    .btn-logout:hover { color: #FCFCFC; border-color: rgba(252,252,252,0.3); }
    .dash-header { margin-bottom: 28px; }
    .dash-title { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .dash-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #54524E; }
    .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
    .metric-card { background: rgba(252,252,252,0.05); border: 1px solid rgba(252,252,252,0.08); border-radius: 10px; padding: 16px; }
    .metric-label { font-size: 10px; color: #54524E; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
    .metric-value { font-size: 28px; font-weight: 800; }
    .metric-value.orange { color: #FF5005; }
    .metric-value.blue { color: #5B8FF9; }
    .metric-value.green { color: #0FA05C; }
    .metric-delta { font-size: 11px; color: #54524E; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .card { background: rgba(252,252,252,0.04); border: 1px solid rgba(252,252,252,0.07); border-radius: 12px; padding: 20px; }
    .card-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: #54524E; font-weight: 600; margin-bottom: 16px; }
    .dim-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .dim-name { font-size: 12px; font-weight: 600; min-width: 110px; color: #FCFCFC; }
    .bar-track { flex: 1; height: 6px; background: rgba(252,252,252,0.07); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
    .dim-score { font-family: 'JetBrains Mono', monospace; font-size: 12px; min-width: 28px; text-align: right; }
    .score-badge { font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; padding: 2px 7px; border-radius: 10px; min-width: 40px; text-align: center; }
    .chart-wrap { position: relative; width: 100%; height: 220px; }
    .feedback-list { display: flex; flex-direction: column; gap: 8px; }
    .feedback-item { background: rgba(252,252,252,0.03); border-left: 2px solid #FF5005; border-radius: 0 8px 8px 0; padding: 10px 14px; }
    .feedback-text { font-size: 12px; color: #DFDFDE; line-height: 1.6; font-style: italic; margin-bottom: 4px; }
    .feedback-dim { font-size: 10px; color: #54524E; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; }
    .divider { height: 1px; background: rgba(252,252,252,0.06); margin: 8px 0 16px; }
    .alert-section { margin-bottom: 20px; }
    .alert { display: flex; gap: 12px; align-items: flex-start; background: rgba(226,55,60,0.08); border: 1px solid rgba(226,55,60,0.2); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
    .alert-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .alert-text { font-size: 12px; color: #FCFCFC; line-height: 1.6; }
    .alert-text strong { color: #E2373C; }
    .alert.warn { background: rgba(255,80,5,0.08); border-color: rgba(255,80,5,0.2); }
    .alert.warn .alert-text strong { color: #FF5005; }
    .spinner { width: 32px; height: 32px; border: 2px solid rgba(252,252,252,0.1); border-top-color: #FF5005; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 80px auto 16px; }
    .spinner-text { text-align: center; font-size: 13px; color: #54524E; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .refresh-btn { background: transparent; border: 1px solid rgba(252,252,252,0.1); color: #93928F; padding: 8px 16px; border-radius: 7px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.18s; display: inline-flex; align-items: center; gap: 6px; }
    .refresh-btn:hover { color: #FCFCFC; border-color: rgba(252,252,252,0.25); }
    .round-selector { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
    .round-btn { background: rgba(252,252,252,0.05); border: 1px solid rgba(252,252,252,0.1); border-radius: 20px; padding: 5px 14px; font-size: 12px; color: #93928F; font-weight: 500; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.18s; }
    .round-btn.active { background: #FF5005; border-color: #FF5005; color: #FCFCFC; }
    .empty-state { text-align: center; padding: 40px 20px; color: #54524E; font-size: 13px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <svg width="52" height="45" viewBox="0 0 20.74 17.96" xmlns="http://www.w3.org/2000/svg"><path d="M11.59,17.32c-1.11.62-2.39.78-3.52.54-2.72-.58-4.3-2.79-4.71-5.97-.16-1.25-.32-2.69-.87-3.9-.43-.97-1.14-1.77-2.35-2.09-.09-.02-.15-.12-.13-.21.08-.38.28-1.3.36-1.69,0-.05.04-.09.08-.11.04-.03.09-.03.14-.02,1.97.48,3.12,1.72,3.81,3.27.62,1.39.85,3.05,1.03,4.49.27,2.17,1.21,3.8,3.07,4.2.73.15,1.56.03,2.25-.43.07-.05.1-.13.07-.21-.4-1.08-3.16-8.68-3.56-9.78-.03-.08,0-.16.07-.21C8.25,4.6,14.26.7,15.29.03c.08-.05.19-.03.25.05.67,1.03,4.58,7.03,5.18,7.95.05.07.04.16-.02.22-.89.92-7.52,7.76-7.52,7.76,0,0,0,0,0,0-.27.28-.91.92-1.57,1.29Z" fill="#ff5005" fill-rule="evenodd"/></svg>
    </div>
    <div class="login-title">Admin Dashboard</div>
    <div class="login-sub">Ingresá la contraseña para ver los resultados</div>
    <input type="password" class="login-input" id="pwd-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="btn-login" onclick="tryLogin()">Ingresar →</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash-screen">
  <div class="dash-nav">
    <div class="dash-logo">
      <svg width="22" height="19" viewBox="0 0 20.74 17.96" xmlns="http://www.w3.org/2000/svg"><path d="M11.59,17.32c-1.11.62-2.39.78-3.52.54-2.72-.58-4.3-2.79-4.71-5.97-.16-1.25-.32-2.69-.87-3.9-.43-.97-1.14-1.77-2.35-2.09-.09-.02-.15-.12-.13-.21.08-.38.28-1.3.36-1.69,0-.05.04-.09.08-.11.04-.03.09-.03.14-.02,1.97.48,3.12,1.72,3.81,3.27.62,1.39.85,3.05,1.03,4.49.27,2.17,1.21,3.8,3.07,4.2.73.15,1.56.03,2.25-.43.07-.05.1-.13.07-.21-.4-1.08-3.16-8.68-3.56-9.78-.03-.08,0-.16.07-.21C8.25,4.6,14.26.7,15.29.03c.08-.05.19-.03.25.05.67,1.03,4.58,7.03,5.18,7.95.05.07.04.16-.02.22-.89.92-7.52,7.76-7.52,7.76,0,0,0,0,0,0-.27.28-.91.92-1.57,1.29Z" fill="#ff5005" fill-rule="evenodd"/></svg>
      <span>Aerolab · Engage</span>
      <span class="admin-badge">ADMIN</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="refresh-btn" onclick="loadData()">↺ Actualizar</button>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </div>
  <div id="dash-content"><div class="spinner"></div><div class="spinner-text">Cargando datos...</div></div>
</div>

<script>
const SUPABASE_URL = 'https://ayddgeuiebhfcqaejowc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eB5HYJg7ug1dBmNlDqIefQ_UA5XjsKH';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ← Cambiá esta contraseña antes de compartir el link
const ADMIN_PASSWORD = 'aerolab2025';

const DIMENSIONS = [
  { id: 'bienestar',    name: 'Bienestar',      color: '#FF5005' },
  { id: 'liderazgo',   name: 'Liderazgo',       color: '#5B8FF9' },
  { id: 'claridad',    name: 'Claridad & Foco', color: '#0FA05C' },
  { id: 'pertenencia', name: 'Pertenencia',      color: '#B3CDFE' },
  { id: 'crecimiento', name: 'Crecimiento',      color: '#FFCCC9' },
];

let currentRound = 'Q1-2025';
let radarChart = null;

function scoreColor(s) { return s >= 4.2 ? '#0FA05C' : s >= 3.2 ? '#FF5005' : '#E2373C'; }
function scoreLabel(s) { return s >= 4.2 ? 'Alto' : s >= 3.2 ? 'Medio' : 'Bajo'; }

function tryLogin() {
  const val = document.getElementById('pwd-input').value;
  const err = document.getElementById('login-error');
  if (val === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dash-screen').style.display = 'block';
    loadData();
  } else {
    err.style.display = 'block';
    document.getElementById('pwd-input').value = '';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'block';
  document.getElementById('dash-screen').style.display = 'none';
  document.getElementById('pwd-input').value = '';
}

async function loadData() {
  document.getElementById('dash-content').innerHTML = '<div class="spinner"></div><div class="spinner-text">Cargando datos...</div>';

  const [responsesRes, scoresRes, commentsRes, answersRes, allRoundsRes] = await Promise.all([
    db.from('survey_responses').select('id').eq('round', currentRound),
    db.from('survey_scores').select('dimension, score, response_id'),
    db.from('survey_comments').select('comment, dimension').limit(8),
    db.from('survey_answers').select('value, question_index'),
    db.from('survey_responses').select('round'),
  ]);

  const total = responsesRes.data?.length || 0;
  const allScores = scoresRes.data || [];
  const comments = commentsRes.data || [];
  const answers = answersRes.data || [];
  const rounds = [...new Set((allRoundsRes.data||[]).map(r=>r.round))];

  // Scores por dimensión
  const dimData = DIMENSIONS.map(dim => {
    const vals = allScores.filter(s => s.dimension === dim.id).map(s => parseFloat(s.score));
    const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
    return { ...dim, avg, count: vals.length };
  });

  const overallVals = dimData.map(d=>d.avg).filter(v=>v!=null);
  const overall = overallVals.length ? overallVals.reduce((a,b)=>a+b,0)/overallVals.length : null;

  // eNPS (pregunta índice 11)
  const enpsAnswers = answers.filter(a => a.question_index === 11).map(a => a.value);
  let enps = null;
  if (enpsAnswers.length) {
    const promoters = enpsAnswers.filter(v=>v===5).length;
    const detractors = enpsAnswers.filter(v=>v<=2).length;
    enps = Math.round((promoters/enpsAnswers.length - detractors/enpsAnswers.length)*100);
  }

  // Alertas
  const alerts = dimData
    .filter(d => d.avg !== null && d.avg < 3.2)
    .sort((a,b) => a.avg - b.avg);

  renderDashboard({ total, dimData, overall, enps, comments, alerts, rounds });
}

function renderDashboard({ total, dimData, overall, enps, comments, alerts, rounds }) {
  const overallStr = overall ? overall.toFixed(1) : '—';
  const enpsStr = enps !== null ? (enps > 0 ? '+' : '') + enps : '—';

  let html = `
    <div class="dash-header">
      <div class="dash-title">Resultados · ${currentRound}</div>
      <div class="dash-sub">Datos en tiempo real desde Supabase · ${total} respuesta${total!==1?'s':''}</div>
    </div>

    <div class="round-selector">
      ${rounds.map(r => `<button class="round-btn ${r===currentRound?'active':''}" onclick="switchRound('${r}')">${r}</button>`).join('')}
    </div>

    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-label">Score general</div>
        <div class="metric-value orange">${overallStr}<span style="font-size:14px;color:#54524E">/5</span></div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Respuestas</div>
        <div class="metric-value">${total}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">eNPS</div>
        <div class="metric-value blue">${enpsStr}</div>
        <div class="metric-delta">Promotores − Detractores</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Dimensión más baja</div>
        <div class="metric-value" style="font-size:18px;color:#E2373C">${dimData.filter(d=>d.avg).sort((a,b)=>a.avg-b.avg)[0]?.name || '—'}</div>
      </div>
    </div>`;

  // Alertas
  if (alerts.length > 0) {
    html += `<div class="alert-section">`;
    alerts.forEach(d => {
      const isCritical = d.avg < 2.8;
      html += `<div class="alert ${isCritical?'':'warn'}">
        <div class="alert-icon">${isCritical?'🚨':'⚠️'}</div>
        <div class="alert-text"><strong>${d.name} — ${d.avg.toFixed(1)}/5 (${scoreLabel(d.avg)})</strong><br>
        ${isCritical ? 'Score crítico. Requiere acción inmediata de liderazgo.' : 'Score en zona de riesgo. Revisá con el equipo en los próximos 30 días.'}</div>
      </div>`;
    });
    html += `</div>`;
  }

  html += `<div class="grid-2">
    <div class="card">
      <div class="card-title">Score por dimensión</div>
      ${dimData.map(d => {
        const s = d.avg;
        const pct = s ? (s/5*100).toFixed(1) : 0;
        return `<div class="dim-row">
          <div class="dim-name" style="display:flex;align-items:center;gap:6px">
            <div style="width:6px;height:6px;border-radius:50%;background:${d.color};flex-shrink:0"></div>
            ${d.name}
          </div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${d.color}"></div></div>
          <div style="display:flex;align-items:center;gap:6px">
            ${s ? `<div class="score-badge" style="background:${scoreColor(s)}22;color:${scoreColor(s)}">${scoreLabel(s)}</div>` : ''}
            <div class="dim-score" style="color:${d.color}">${s ? s.toFixed(1) : '—'}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-title">Radar por dimensión</div>
      <div class="chart-wrap"><canvas id="radar-chart"></canvas></div>
    </div>
  </div>

  ${comments.length > 0 ? `
  <div class="card">
    <div class="card-title">Comentarios abiertos</div>
    <div class="feedback-list">
      ${comments.map(c=>`<div class="feedback-item">
        <div class="feedback-text">"${c.comment}"</div>
        <div class="feedback-dim">${c.dimension}</div>
      </div>`).join('')}
    </div>
  </div>` : total > 0 ? '' : `<div class="empty-state">Todavía no hay respuestas para esta ronda.</div>`}`;

  document.getElementById('dash-content').innerHTML = html;

  // Radar chart
  if (dimData.some(d => d.avg)) {
    if (radarChart) { radarChart.destroy(); radarChart = null; }
    const ctx = document.getElementById('radar-chart');
    if (ctx) {
      radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: DIMENSIONS.map(d => d.name),
          datasets: [{
            data: dimData.map(d => d.avg ? parseFloat(d.avg.toFixed(2)) : 0),
            backgroundColor: 'rgba(255,80,5,0.15)',
            borderColor: '#FF5005',
            borderWidth: 2,
            pointBackgroundColor: '#FF5005',
            pointRadius: 4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            r: {
              min: 0, max: 5,
              ticks: { stepSize: 1, color: '#54524E', font: { size: 10 }, backdropColor: 'transparent' },
              grid: { color: 'rgba(252,252,252,0.07)' },
              angleLines: { color: 'rgba(252,252,252,0.07)' },
              pointLabels: { color: '#93928F', font: { size: 11, family: 'Plus Jakarta Sans' } }
            }
          },
          plugins: { legend: { display: false } }
        }
      });
    }
  }
}

function switchRound(round) {
  currentRound = round;
  loadData();
}
</script>
</body>
</html>
